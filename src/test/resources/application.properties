# -----------------------------------------------------------------------
# Test configuration - overrides main application.properties
# Flapdoodle embedded MongoDB is auto-configured when on test classpath.
# The spring.data.mongodb.uri below is overridden by EmbeddedMongoAutoConfiguration.
# -----------------------------------------------------------------------
spring.application.name=appchatbackend-test

# JWT (must match SecurityConfig @Value requirement)
jwt.secret=7a4f2c8d1e9b3f6a0d5c2e8b4f1a7d3c9e6b2f5a8d1c4e7b0f3a6d9c2e5b8f1
jwt.expiration=86400000

# Suppress verbose MongoDB debug logs during tests
logging.level.org.springframework.data.mongodb.core.MongoTemplate=WARN
